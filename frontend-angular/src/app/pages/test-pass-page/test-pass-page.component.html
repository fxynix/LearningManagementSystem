<div class="container">
    <nz-spin [nzSpinning]="loading" [nzTip]="'Загрузка...'">
        <div *ngIf="test && questions.length > 0">
            <h2>{{ test.title }}</h2>
            <p>{{ test.description }}</p>
            <nz-divider></nz-divider>
            <div style="margin-bottom:16px;">
                <strong>Вопрос {{ currentIndex + 1 }} из {{ questions.length }}</strong>
            </div>
            <nz-card>
                <p><strong>{{ currentQuestion?.question }}</strong></p>

                <nz-radio-group *ngIf="currentQuestion?.type === 'choice'" [(ngModel)]="answers[currentIndex]" style="display: flex; flex-direction: column; gap: 10px;">
                    <label nz-radio *ngFor="let opt of currentQuestion?.options" [nzValue]="opt.text">
                        {{ opt.text }}
                    </label>
                </nz-radio-group>

                <div *ngIf="currentQuestion?.type === 'multi'" class="multi-option">
                    <label *ngFor="let opt of currentQuestion?.options">
                        <input type="checkbox"
                               [checked]="(answers[currentIndex] || []).includes(opt.text)"
                               (change)="toggleOption(opt.text)" />
                        {{ opt.text }}
                    </label>
                </div>

                <input *ngIf="currentQuestion?.type === 'short' || currentQuestion?.type === 'numeric'" nz-input placeholder="Введите ответ" [value]="answers[currentIndex]" (input)="onShortChange($event)" />

                <textarea *ngIf="currentQuestion?.type === 'essay'" nz-input rows="4" placeholder="Введите развернутый ответ" [value]="answers[currentIndex]" (input)="onShortChange($event)"></textarea>
            </nz-card>

            <div style="margin-top:16px; display:flex; justify-content:space-between;">
                <button nz-button (click)="prevQuestion()" [disabled]="currentIndex === 0">Назад</button>
                <button nz-button nzType="primary" *ngIf="currentIndex < questions.length - 1" (click)="nextQuestion()">Далее</button>
                <button nz-button nzType="primary" *ngIf="currentIndex === questions.length - 1" (click)="submitTest()" [nzLoading]="submitting">Завершить тест</button>
            </div>
            <nz-progress [nzPercent]="progressPercent" nzStatus="active" style="margin-top:16px;"></nz-progress>
        </div>

        <div *ngIf="!loading && questions.length === 0">
            <nz-alert nzType="info" nzMessage="В этом тесте нет вопросов"></nz-alert>
        </div>
    </nz-spin>
</div>
