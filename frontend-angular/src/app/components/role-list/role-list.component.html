<div class="container">
    <div class="actions">
        <input nz-input placeholder="Поиск по названию" [(ngModel)]="searchName" (ngModelChange)="onSearchChange($event)" style="width:250px;" />
        <button nz-button (click)="resetSearch()">Сбросить</button>
        <button nz-button nzType="primary" *ngIf="isAdmin()" (click)="showModal()" class="add-btn">Добавить роль</button>
    </div>

    <nz-table
            [nzData]="roles"
            [nzLoading]="loading"
            [nzTotal]="total"
            [nzPageSize]="pageSize"
            [nzPageIndex]="pageIndex"
            (nzPageIndexChange)="onPageChange($event)"
            nzNoResult="Нет данных"
            [nzFrontPagination]="false"
    >
        <thead>
        <tr>
            <th *ngIf="isAdmin()">ID</th>
            <th>Название</th>
            <th>Описание</th>
            <th>Пользователей</th>
            <th *ngIf="isAdmin()">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let role of roles">
            <td *ngIf="isAdmin()">{{ role.id }}</td>
            <td><a [routerLink]="['/roles', role.id]">{{ role.name }}</a></td>
            <td>{{ role.description }}</td>
            <td>{{ getUserCountForRole(role.id) }}</td>
            <td *ngIf="isAdmin()">
                <button nz-button nzType="link" (click)="showModal(role)"><i nz-icon nzType="edit"></i></button>
                <button nz-button nzType="link" nzDanger (click)="deleteRole(role.id)"><i nz-icon nzType="delete"></i></button>
            </td>
        </tr>
        </tbody>
    </nz-table>

    <nz-modal
            [(nzVisible)]="isVisible"
            [nzTitle]="isEdit ? 'Редактировать роль' : 'Новая роль'"
            nzOkText="Сохранить"
            nzCancelText="Отмена"
            (nzOnCancel)="handleCancel()"
            (nzOnOk)="handleOk()"
    >
        <ng-template nzModalContent>
            <form nz-form [formGroup]="form">
                <nz-form-item>
                    <nz-form-label>Название</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Обязательное поле'">
                        <input nz-input formControlName="name" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Описание</nz-form-label>
                    <nz-form-control>
                        <textarea nz-input formControlName="description"></textarea>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </ng-template>
    </nz-modal>
</div>
