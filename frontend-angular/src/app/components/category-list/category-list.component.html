<div class="container">
    <div class="actions">
        <input nz-input placeholder="Поиск по названию" [(ngModel)]="searchName" (ngModelChange)="onSearchChange($event)" style="width:250px;" />
        <button nz-button (click)="resetSearch()">Сбросить</button>
        <button nz-button nzType="primary" *ngIf="canManage()" (click)="showModal()" class="add-btn">Добавить категорию</button>
    </div>

    <nz-table
            [nzData]="categories"
            [nzLoading]="loading"
            [nzTotal]="total"
            [nzPageSize]="pageSize"
            [nzPageIndex]="pageIndex"
            (nzPageIndexChange)="onPageChange($event)"
            nzNoResult="Нет данных"
            [nzFrontPagination]="false"
    >
        <thead>
        <tr>
            <th *ngIf="isAdmin()">ID</th>
            <th>Название</th>
            <th>Описание</th>
            <th *ngIf="canManage()">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let cat of categories">
            <td *ngIf="isAdmin()">{{ cat.id }}</td>
            <td><a [routerLink]="['/categories', cat.id]">{{ cat.name }}</a></td>
            <td>{{ cat.description }}</td>
            <td *ngIf="canManage()">
                <button nz-button nzType="link" (click)="showModal(cat)"><i nz-icon nzType="edit"></i></button>
                <button nz-button nzType="link" nzDanger (click)="deleteCategory(cat.id)"><i nz-icon nzType="delete"></i></button>
            </td>
        </tr>
        </tbody>
    </nz-table>

    <nz-modal
            [(nzVisible)]="isVisible"
            [nzTitle]="isEdit ? 'Редактировать категорию' : 'Новая категория'"
            nzOkText="Сохранить"
            nzCancelText="Отмена"
            (nzOnCancel)="handleCancel()"
            (nzOnOk)="handleOk()"
    >
        <ng-template nzModalContent>
            <form nz-form [formGroup]="form">
                <nz-form-item>
                    <nz-form-label>Название</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Обязательное поле'">
                        <input nz-input formControlName="name" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Описание</nz-form-label>
                    <nz-form-control>
                        <textarea nz-input formControlName="description"></textarea>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </ng-template>
    </nz-modal>
</div>
