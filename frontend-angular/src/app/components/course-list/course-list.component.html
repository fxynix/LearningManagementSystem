<div class="container">
    <div class="actions">
        <input nz-input placeholder="Поиск по названию" [(ngModel)]="searchTitle" (ngModelChange)="onSearchChange($event)" style="width:200px;" />
        <nz-select *ngIf="categories.length > 0" [(ngModel)]="filterCategoryId" nzPlaceHolder="Категория" nzAllowClear (ngModelChange)="onFilterChange()" style="width:150px;">
            <nz-option *ngFor="let cat of categories" [nzValue]="cat.id" [nzLabel]="cat.name"></nz-option>
        </nz-select>
        <nz-select *ngIf="categories.length === 0" nzPlaceHolder="Загрузка категорий..." disabled style="width:150px;"></nz-select>
        <nz-select *ngIf="teachers.length > 0" [(ngModel)]="filterTeacherId" nzPlaceHolder="Преподаватель" nzAllowClear (ngModelChange)="onFilterChange()" style="width:150px;">
            <nz-option *ngFor="let user of teachers" [nzValue]="user.id" [nzLabel]="user.fullName || user.username"></nz-option>
        </nz-select>
        <nz-select *ngIf="teachers.length === 0" nzPlaceHolder="Загрузка преподавателей..." disabled style="width:150px;"></nz-select>
        <button nz-button (click)="resetFilters()">Сбросить</button>
        <button nz-button nzType="primary" *ngIf="canCreate()" (click)="showModal()" class="add-btn">Добавить курс</button>
    </div>

    <nz-table
            [nzData]="courses"
            [nzLoading]="loading"
            [nzTotal]="total"
            [nzPageSize]="pageSize"
            [nzPageIndex]="pageIndex"
            (nzPageIndexChange)="onPageChange($event)"
            nzNoResult="Нет данных"
            [nzFrontPagination]="false"
    >
        <thead>
        <tr>
            <th *ngIf="auth.isAdmin()">ID</th>
            <th>Название</th>
            <th>Категория</th>
            <th>Преподаватель</th>
            <th>Роли (доступ)</th>
            <th *ngIf="canCreate()">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let course of courses">
            <td *ngIf="auth.isAdmin()">{{ course.id }}</td>
            <td><a [routerLink]="['/courses', course.id]">{{ course.title }}</a></td>
            <td><a *ngIf="course.category" [routerLink]="['/categories', course.category.id]">{{ course.category.name }}</a></td>
            <td>{{ course.teacher?.fullName || '—' }}</td>
            <td>
                <nz-tag *ngFor="let role of course.roles" nzColor="blue" [routerLink]="['/roles', role.id]">{{ role.name }}</nz-tag>
            </td>
            <td *ngIf="canCreate()">
                <button nz-button nzType="link" *ngIf="canEdit(course)" (click)="showModal(course)"><i nz-icon nzType="edit"></i></button>
                <button nz-button nzType="link" nzDanger *ngIf="canEdit(course)" (click)="deleteCourse(course.id)"><i nz-icon nzType="delete"></i></button>
            </td>
        </tr>
        </tbody>
    </nz-table>

    <nz-modal
            [(nzVisible)]="isVisible"
            [nzTitle]="isEdit ? 'Редактировать курс' : 'Новый курс'"
            nzOkText="Сохранить"
            nzCancelText="Отмена"
            (nzOnCancel)="handleCancel()"
            (nzOnOk)="handleOk()"
            [nzWidth]="700"
    >
        <ng-template nzModalContent>
            <form nz-form [formGroup]="form">
                <nz-form-item>
                    <nz-form-label>Название</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Обязательное поле'">
                        <input nz-input formControlName="title" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Описание</nz-form-label>
                    <nz-form-control>
                        <textarea nz-input formControlName="description"></textarea>
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Категория</nz-form-label>
                    <nz-form-control>
                        <nz-select *ngIf="categories.length > 0" formControlName="categoryId" nzAllowClear nzPlaceHolder="Выберите категорию">
                            <nz-option *ngFor="let cat of categories" [nzValue]="cat.id" [nzLabel]="cat.name"></nz-option>
                        </nz-select>
                        <nz-select *ngIf="categories.length === 0" nzPlaceHolder="Загрузка категорий..." disabled></nz-select>
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Преподаватель</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Обязательное поле'">
                        <nz-select *ngIf="teachers.length > 0" formControlName="teacherId" nzPlaceHolder="Выберите преподавателя">
                            <nz-option *ngFor="let user of teachers" [nzValue]="user.id" [nzLabel]="user.fullName || user.username"></nz-option>
                        </nz-select>
                        <nz-select *ngIf="teachers.length === 0" nzPlaceHolder="Загрузка преподавателей..." disabled></nz-select>
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Роли (доступ)</nz-form-label>
                    <nz-form-control>
                        <nz-select *ngIf="roles.length > 0" formControlName="roleIds" nzMode="multiple" nzPlaceHolder="Выберите роли">
                            <nz-option *ngFor="let role of roles" [nzValue]="role.id" [nzLabel]="role.name"></nz-option>
                        </nz-select>
                        <nz-select *ngIf="roles.length === 0" nzPlaceHolder="Загрузка ролей..." disabled></nz-select>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </ng-template>
    </nz-modal>
</div>
