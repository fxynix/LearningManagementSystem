<div class="container">
    <div class="actions">
        <input nz-input placeholder="Поиск по названию" [(ngModel)]="searchTitle" (ngModelChange)="onSearchChange($event)" style="width:250px;" />
        <nz-select *ngIf="courses.length > 0" [(ngModel)]="filterCourseId" nzPlaceHolder="Курс" nzAllowClear (ngModelChange)="loadLectures()" style="width:180px;">
            <nz-option *ngFor="let course of courses" [nzValue]="course.id" [nzLabel]="course.title"></nz-option>
        </nz-select>
        <nz-select *ngIf="courses.length === 0" nzPlaceHolder="Загрузка курсов..." disabled style="width:180px;"></nz-select>
        <button nz-button (click)="resetFilters()">Сбросить</button>
        <button nz-button nzType="primary" *ngIf="canCreate()" class="add-btn" (click)="showModal()">Добавить лекцию</button>
    </div>

    <nz-table
            [nzData]="lectures"
            [nzLoading]="loading"
            [nzTotal]="total"
            [nzPageSize]="pageSize"
            [nzPageIndex]="pageIndex"
            (nzPageIndexChange)="onPageChange($event)"
            nzNoResult="Нет данных"
            [nzFrontPagination]="false"
    >
        <thead>
        <tr>
            <th *ngIf="auth.isAdmin()">ID</th>
            <th>Название</th>
            <th>Курс</th>
            <th>Порядок</th>
            <th *ngIf="canCreate()">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let lecture of lectures">
            <td *ngIf="auth.isAdmin()">{{ lecture.id }}</td>
            <td><a [routerLink]="['/lectures', lecture.id]">{{ lecture.title }}</a></td>
            <td><a *ngIf="lecture.course" [routerLink]="['/courses', lecture.course.id]">{{ lecture.course.title }}</a></td>
            <td>{{ lecture.orderNumber }}</td>
            <td *ngIf="canCreate()">
                <button nz-button nzType="link" *ngIf="canEdit(lecture)" (click)="showModal(lecture)"><i nz-icon nzType="edit"></i></button>
                <button nz-button nzType="link" nzDanger *ngIf="canEdit(lecture)" (click)="deleteLecture(lecture.id)"><i nz-icon nzType="delete"></i></button>
            </td>
        </tr>
        </tbody>
    </nz-table>

    <nz-modal
            [(nzVisible)]="isVisible"
            [nzTitle]="isEdit ? 'Редактировать лекцию' : 'Новая лекция'"
            nzOkText="Сохранить"
            nzCancelText="Отмена"
            (nzOnCancel)="handleCancel()"
            (nzOnOk)="handleOk()"
            [nzWidth]="600"
    >
        <ng-template nzModalContent>
            <form nz-form [formGroup]="form">
                <nz-form-item>
                    <nz-form-label>Название</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Обязательное поле'">
                        <input nz-input formControlName="title" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Содержание</nz-form-label>
                    <nz-form-control>
                        <textarea nz-input formControlName="content"></textarea>
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Порядок</nz-form-label>
                    <nz-form-control>
                        <input nz-input type="number" formControlName="orderNumber" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Курс</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Обязательное поле'">
                        <nz-select *ngIf="courses.length > 0" formControlName="courseId" nzPlaceHolder="Выберите курс">
                            <nz-option *ngFor="let course of courses" [nzValue]="course.id" [nzLabel]="course.title"></nz-option>
                        </nz-select>
                        <nz-select *ngIf="courses.length === 0" nzPlaceHolder="Загрузка курсов..." disabled></nz-select>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </ng-template>
    </nz-modal>
</div>
