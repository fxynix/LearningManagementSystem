<div class="container">
    <div class="actions">
        <input nz-input placeholder="Поиск по логину" [(ngModel)]="searchUsername" (ngModelChange)="onSearchChange($event)" style="width:250px;" />
        <button nz-button (click)="resetSearch()">Сбросить</button>
        <button nz-button nzType="primary" (click)="showModal()" class="add-btn">Добавить пользователя</button>
    </div>

    <nz-table
            [nzData]="users"
            [nzLoading]="loading"
            [nzTotal]="total"
            [nzPageSize]="pageSize"
            [nzPageIndex]="pageIndex"
            (nzPageIndexChange)="onPageChange($event)"
            nzNoResult="Нет данных"
            [nzFrontPagination]="false"
    >
        <thead>
        <tr>
            <th *ngIf="isAdmin()">ID</th>
            <th>Логин</th>
            <th>Email</th>
            <th>Полное имя</th>
            <th>Роли</th>
            <th *ngIf="isAdmin()">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let user of users">
            <td *ngIf="isAdmin()">{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.fullName }}</td>
            <td>
                <nz-tag *ngFor="let role of user.roles" nzColor="blue" [routerLink]="['/roles', role.id]">{{ role.name }}</nz-tag>
            </td>
            <td *ngIf="isAdmin()">
                <button nz-button nzType="link" (click)="showModal(user)"><i nz-icon nzType="edit"></i></button>
                <button nz-button nzType="link" nzDanger (click)="deleteUser(user.id)"><i nz-icon nzType="delete"></i></button>
            </td>
        </tr>
        </tbody>
    </nz-table>

    <nz-modal
            [(nzVisible)]="isVisible"
            [nzTitle]="isEdit ? 'Редактировать пользователя' : 'Новый пользователь'"
            nzOkText="Сохранить"
            nzCancelText="Отмена"
            (nzOnCancel)="handleCancel()"
            (nzOnOk)="handleOk()"
    >
        <ng-template nzModalContent>
            <form nz-form [formGroup]="form">
                <nz-form-item>
                    <nz-form-label>Логин</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Обязательное поле'">
                        <input nz-input formControlName="username" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Email</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Введите корректный email'">
                        <input nz-input formControlName="email" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item *ngIf="!isEdit">
                    <nz-form-label>Пароль</nz-form-label>
                    <nz-form-control [nzErrorTip]="'Минимум 6 символов'">
                        <input nz-input type="password" formControlName="password" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Полное имя</nz-form-label>
                    <nz-form-control>
                        <input nz-input formControlName="fullName" />
                    </nz-form-control>
                </nz-form-item>
                <nz-form-item>
                    <nz-form-label>Роли</nz-form-label>
                    <nz-form-control>
                        <nz-select *ngIf="roles.length > 0" formControlName="roleIds" nzMode="multiple" nzPlaceHolder="Выберите роли">
                            <nz-option *ngFor="let role of roles" [nzValue]="role.id" [nzLabel]="role.name"></nz-option>
                        </nz-select>
                        <nz-select *ngIf="roles.length === 0" nzPlaceHolder="Загрузка ролей..." disabled></nz-select>
                    </nz-form-control>
                </nz-form-item>
            </form>
        </ng-template>
    </nz-modal>
</div>
